# .github/workflows/snake.yml
# This workflow generates the contribution snake animation
# The snake goes UP and DOWN across your contribution graph!

name: Generate Snake Animation

on:
  # Runs every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Also allows manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generate the snake SVG from your GitHub contributions
      - name: Generate Snake Game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          # Output for dark mode — snake goes UP and DOWN
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=58a6ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

            dist/github-snake.svg?palette=github&color_snake=0969da&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      # Push the generated SVGs to the output branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
